name: Tunnel Server V22 (Ultra-Fast & IPv4-Forced)

on:
  push:
    paths:
      - 'request.txt'

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 

      - name: Setup Tools
        run: |
          echo "=========================================="
          echo "[*] Initializing Ultra Setup..."
          echo "=========================================="
          sudo apt-get update
          sudo apt-get install -y jq xvfb libgbm-dev ffmpeg curl aria2
          
          python3 -m pip install -U curl-cffi brotli websockets mutagen certifi urllib3 requests
          python3 -m pip install --no-cache-dir -U https://github.com/yt-dlp/yt-dlp/archive/master.zip
          yt-dlp --rm-cache-dir

      - name: Process Request
        run: |
          REQ_TYPE=$(sed -n '1p' request.txt | tr -d '\r')
          URL=$(sed -n '2p' request.txt | tr -d '\r')
          FORMAT=$(sed -n '3p' request.txt | tr -d '\r')
          REQ_ID=$(sed -n '4p' request.txt | tr -d '\r')

          mkdir -p result
          rm -rf result/*
          cd result
          touch process.log

          {
            echo "======================================"
            echo "[*] Request ID: $REQ_ID"
            echo "[*] Request Type: $REQ_TYPE"
            echo "[*] Target URL: $URL"
            echo "[*] Requested Format: $FORMAT"
            echo "======================================"
          } >> process.log

          BASE_DOMAIN=$(echo "$URL" | awk -F/ '{print $1"//"$3}')
          
          # استخراج نام ویدیو
          yt-dlp --print title "$URL" --no-warnings > title.txt 2>/dev/null || echo "Unknown_Video" > title.txt

          if [ "$REQ_TYPE" = "WEB" ]; then
            curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" "$URL" -o response.html >> process.log 2>&1
            
          elif [ "$REQ_TYPE" = "INFO" ]; then
            echo "[*] Starting INFO Extraction..." >> process.log
            
            # استفاده از IPv4 برای مرحله استخراج اطلاعات
            if yt-dlp --force-ipv4 -F "$URL" --no-warnings > info.txt 2>> process.log; then
                echo "[+] Standard Extraction Succeeded." >> process.log
            else
                if yt-dlp --force-ipv4 --impersonate chrome -F "$URL" --no-warnings > info.txt 2>> process.log; then
                    echo "[+] Impersonate Succeeded." >> process.log
                else
                    echo "❌ YT-DLP EXTRACTION ERROR:" > info.txt
                    echo "[CRITICAL] All INFO extractions failed." >> process.log
                fi
            fi
            
          elif [ "$REQ_TYPE" = "VIDEO" ]; then
            echo "==========================================================" >> process.log
            echo "  [*] Starting High-Speed Video Download (Aria2c)" >> process.log
            
            # دانلود حرفه‌ای با Aria2c و اجبار به استفاده از IPv4
            yt-dlp --newline \
                   --force-ipv4 \
                   --downloader aria2c \
                   --downloader-args aria2c:"-x 16 -s 16 -k 1M" \
                   --no-check-certificate \
                   --geo-bypass \
                   --postprocessor-args "ffmpeg:-nostdin -y" \
                   --merge-output-format mp4 \
                   -f "$FORMAT" \
                   -o "raw_video.%(ext)s" "$URL" 2>&1 | tee -a process.log

            if ls raw_video.* 1> /dev/null 2>&1; then
              RAW_FILE=$(ls raw_video.* | head -n 1)
              echo "[+] Download successful: $RAW_FILE" >> process.log
              
              # کمپرس ویدیو با FFmpeg بدون گیر کردن
              ffmpeg -nostdin -y -i "$RAW_FILE" \
                     -c:v libx264 -crf 28 -preset ultrafast -c:a aac -b:a 128k \
                     -hide_banner -loglevel warning -stats \
                     compressed_video.mp4 2>&1 | tee -a process.log
              
              if [ -f "compressed_video.mp4" ] && [ -s "compressed_video.mp4" ]; then
                split -b 40M -d compressed_video.mp4 "video_part_"
                rm "$RAW_FILE" compressed_video.mp4
              else
                split -b 40M -d "$RAW_FILE" "video_part_"
                rm "$RAW_FILE"
              fi
            else
              echo "DOWNLOAD_FAILED" > error.log
            fi
          fi

          cd ..
          echo "$REQ_ID" > .server_done

      - name: Commit & Push Back
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add result/
          git add .server_done

          git commit -m "Payload Ready: [$GITHUB_RUN_ID]" || echo "No changes to commit"
          git push origin HEAD:main
